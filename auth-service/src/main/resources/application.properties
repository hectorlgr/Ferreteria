spring.application.name=auth-service

# Puerto del servicio catalogo-service
server.port=9096

# Conexion a la base de datos db_auth, si no existe se crea automaticamente
spring.datasource.url=jdbc:mysql://localhost:3306/db_auth?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

#JWT
jwt.secret=FerreteriaSuperSecretaKeyParaTokens

#Eureka
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/