spring.application.name=auth-service

# Puerto del servicio catalogo-service
server.port=9096

# Conexion a la base de datos db_auth, si no existe se crea automaticamente
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/db_auth?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&autoReconnect=true&socketTimeout=10000&connectTimeout=10000
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP - evita conexiones muertas por inestabilidad de host.docker.internal
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=30000

#JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

#JWT
jwt.secret=FerreteriaSuperSecretaKeyParaTokens

#Eureka
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

#Swagger
springdoc.override-with-generic-response=false
springdoc.api-docs.path=/auth/v3/api-docs
server.forward-headers-strategy=framework
# http://localhost:9096/swagger-ui/index.html