spring.application.name=promocion-service
server.port=9099

# Conexión a la BD
spring.datasource.url=jdbc:mysql://localhost:3306/db_promociones?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA y Liquibase
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/