spring.application.name=inventario-service

# Puerto del servicio inventario-service
server.port=9093

# Conexion a la base de datos db_inventario, si no existe se crea automaticamente
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/db_inventario?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

#Liquibase
spring.liquibase.enabled=true
# Ruta del archivo con las instrucciones para crear la tabla y los 10 registros
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql

#Logger
logging.file.name=logs/inventario-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

#Eureka
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/

#Swagger
springdoc.override-with-generic-response=false
# Acceso local: http://localhost:9093/swagger-ui/index.html