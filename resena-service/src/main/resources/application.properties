spring.application.name=resena-service
server.port=9097

# Conexión a la BD
spring.datasource.url=jdbc:mysql://localhost:3306/db_resenas?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA y Liquibase
spring.jpa.show-sql=True
spring.jpa.hibernate.ddl-auto=update
spring.liquibase.enabled=False  
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql

#Logger
logging.file.name=logs/resena-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

#Swagger   
springdoc.override-with-generic-response=false
# Acceso local: http://localhost:9097/swagger-ui/index.html