spring.application.name=resena-service
server.port=9097

# Conexión a la BD
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/db_resenas?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&autoReconnect=true&socketTimeout=10000&connectTimeout=10000
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP - evita conexiones muertas por inestabilidad de host.docker.internal
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=30000

# JPA y Liquibase
spring.jpa.show-sql=True
spring.jpa.hibernate.ddl-auto=update
spring.liquibase.enabled=False
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql

#Logger
logging.file.name=logs/resena-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

# Eureka
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

#Swagger   
springdoc.override-with-generic-response=false
springdoc.api-docs.path=/api/resenas/v3/api-docs
server.forward-headers-strategy=framework
# Acceso local: http://localhost:9097/swagger-ui/index.html