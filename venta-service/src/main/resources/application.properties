spring.application.name=venta-service

server.port=9094

spring.datasource.url=jdbc:mysql://localhost:3306/db_ventas?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql

eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false

# --- CONFIGURACIÓN DE LOGS ---
# Define la carpeta y el nombre del archivo donde se guardará la historia
logging.file.name=logs/venta-service.log
# Define cómo se ve el texto en la consola de VS Code
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
# Define cómo se ve el texto dentro del archivo .log
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n