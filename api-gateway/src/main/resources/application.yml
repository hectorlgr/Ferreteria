server:
  port: 9090

spring:
  main:
    web-application-type: reactive

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: FerreteriaSuperSecretaKeyParaTokens

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:9096
          predicates:
            - Path=/auth/**

        - id: venta-service
          uri: http://localhost:9094
          predicates:
            - Path=/api/ventas/**

        - id: catalogo-service
          uri: http://localhost:9091
          predicates:
            - Path=/api/productos/**

        - id: usuario-service
          uri: http://localhost:9092
          predicates:
            - Path=/api/usuarios/**

        - id: inventario-service
          uri: http://localhost:9093
          predicates:
            - Path=/api/inventario/**
            
        - id: despacho-service
          uri: http://localhost:9095
          predicates:
            - Path=/api/despachos/**