spring.application.name=pedido-service
server.port=9098

# Conexión a la BD
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/db_pedidos?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA y Liquibase
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql

# Eureka
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/

#Swagger
springdoc.override-with-generic-response=false
# Acceso local: http://localhost:9098/swagger-ui/index.html