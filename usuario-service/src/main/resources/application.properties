spring.application.name=usuario-service

# Puerto del servicio usuario-service
server.port=9092

# Conexion a la base de datos db_usuarios, si no existe se crea automaticamente
spring.datasource.url=jdbc:mysql://localhost:3306/db_usuarios?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

#Liquibase
spring.liquibase.enabled=False
# Ruta del archivo con las instrucciones para crear la tabla y los 10 registros
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql

#Logger
logging.file.name=logs/usuario-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

#Eureka
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/