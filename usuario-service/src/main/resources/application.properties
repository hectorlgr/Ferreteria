spring.application.name=usuario-service

# Puerto del servicio usuario-service
server.port=9092

# Conexion a la base de datos db_usuarios, si no existe se crea automaticamente
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/db_usuarios?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

#Liquibase
spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql

#Logger
logging.file.name=logs/usuario-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

#Eureka
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/

#Swagger
springdoc.override-with-generic-response=false
springdoc.api-docs.path=/api/usuarios/v3/api-docs
server.forward-headers-strategy=framework
# Acceso local: http://localhost:9092/swagger-ui/index.html