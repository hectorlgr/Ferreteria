spring.application.name=despacho-service

server.port=9095

spring.datasource.url=jdbc:mysql://localhost:3306/db_despachos?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql

eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false