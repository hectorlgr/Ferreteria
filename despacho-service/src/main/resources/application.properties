spring.application.name=despacho-service

# Puerto del servicio despacho-service
server.port=9095

# Conexion a la base de datos db_despachos, si no existe se crea automaticamente
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/db_despachos?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&autoReconnect=true&socketTimeout=10000&connectTimeout=10000
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP - evita conexiones muertas por inestabilidad de host.docker.internal
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=30000

# JPA y Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql

#Logger
logging.file.name=/logs/despacho-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

#Eureka
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

#Swagger
springdoc.override-with-generic-response=false
springdoc.api-docs.path=/api/despachos/v3/api-docs
server.forward-headers-strategy=framework
# Acceso local: http://localhost:9095/swagger-ui/index.html